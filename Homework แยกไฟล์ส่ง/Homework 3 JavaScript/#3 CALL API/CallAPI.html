<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แสดงวันเวลาภาษาไทย Fetch API</title>
    <style>
        body {
            font-family: 'Sarabun', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        
        #datetime-display {
            font-size: 48px; 
            font-weight: bold;
            padding: 40px 60px; 
            border-radius: 16px; 
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center;
        }

        /* เผื่อไว้สำหรับมือถือ (Responsive) ถ้าจอเล็กกว่า 768px ให้ลดขนาดฟอนต์ลงจะได้ไม่ล้นจอ */
        @media (max-width: 768px) {
            #datetime-display {
                font-size: 28px;
                padding: 30px 40px;
            }
        }

        .error {
            color: #dc3545;
        }
        .success {
            color: #333;
        }
    </style>
</head>
<body>

    <div id="datetime-display">กำลังโหลดข้อมูล...</div>

    <script>
        // ฟังก์ชันนี้รับค่า ISO String จาก API มาแปลงเป็นข้อความภาษาไทยตามที่อาจารย์กำหนด
        function formatThaiDateTime(isoString) {
            const date = new Date(isoString);
            const thaiMonths = [
                "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
            ];
            
            const day = date.getDate();
            const month = thaiMonths[date.getMonth()];
            const year = date.getFullYear() + 543; // จับ ค.ศ. มาบวก 543 ให้เป็น พ.ศ.
            
            // เช็คว่าถ้าชั่วโมง/นาที/วินาทีเป็นเลขหลักเดียว ให้เติม '0' ข้างหน้าด้วยคำสั่ง padStart
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            
            return `วันที่ ${day} ${month} ${year}\nเวลา ${hours}:${minutes}:${seconds} น.`;
        }

        // ฟังก์ชันหลักสำหรับยิง Fetch API ไปดึงข้อมูล
        function fetchDateTime() {
            const apiUrl = 'https://learningportal.ocsc.go.th/learningspaceapi/localdatetime';
            const displayElement = document.getElementById('datetime-display');
            
            // สร้าง AbortController มาช่วยจำกัดเวลาเชื่อมต่อ (ตั้ง Timeout ไว้ 3 วินาทีตามโจทย์)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000); 

            // ใส่ signal เข้าไปใน fetch เพื่อให้เชื่อมกับตัว AbortController ด้านบน
            fetch(apiUrl, { signal: controller.signal })
                .then(response => {
                    // throw new Error('network connection timeout'); 

                    // เช็คสถานะก่อน ถ้าโอเคถึงจะแปลงเป็น JSON
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json(); 
                })
                .then(data => {
                    // เอาข้อมูล data.datetime ที่ได้ ส่งไปแปลงเป็นภาษาไทยผ่านฟังก์ชันที่เราเตรียมไว้
                    const thaiDateTimeStr = formatThaiDateTime(data.datetime);
                    
                    displayElement.innerText = thaiDateTimeStr;
                    displayElement.className = 'success'; // โชว์ตัวหนังสือสีดำปกติ
                })
                .catch(error => {
                    // บล็อกนี้จะคอยดัก Error ทุกรูปแบบ ไม่ว่าจะเน็ตหลุด หรือเกิด Timeout จากที่เราตั้งไว้ 3 วิ
                    console.log('Error details:', error.toString());
                    displayElement.innerText = 'ระบบเครือข่ายล้มเหลว';
                    displayElement.className = 'error';
                })
                .finally(() => {
                    // ถ้าดึงข้อมูลเสร็จก่อน 3 วิ ก็สั่งเคลียร์ Timeout ทิ้ง เพื่อไม่ให้เปลืองทรัพยากรเครื่อง
                    clearTimeout(timeoutId);
                });
        }

        // เรียกใช้งานครั้งแรกทันทีตอนโหลดเว็บ
        fetchDateTime();

        // ใช้ setInterval สั่งให้ฟังก์ชัน fetch ทำงานซ้ำทุกๆ 1 วินาที เพื่อให้เวลาเดินเรื่อย ๆ
        setInterval(fetchDateTime, 1000);
    </script>

</body>
</html>
