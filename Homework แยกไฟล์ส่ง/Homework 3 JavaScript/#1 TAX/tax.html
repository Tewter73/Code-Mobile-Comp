<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณภาษีเงินได้บุคคลธรรมดา</title>
    <style>
        body {
            font-family: 'Sarabun', Tahoma, sans-serif;
            background-color: #f9f9f9;
            padding: 20px;
            margin: 0; 
            
            /* จัดให้หน้าต่างโปรแกรมอยู่กึ่งกลางหน้าจอเสมอ */
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
        }

        /* กล่องใหญ่สุดสำหรับคลุมเนื้อหาทั้งหมด (แบ่งเป็น 2 ฝั่ง: ซ้ายฟอร์ม ขวารูปตาราง) */
        .main-wrapper {
            display: flex;
            background-color: white;
            padding: 40px; 
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            gap: 40px; 
            max-width: 1200px; /* จำกัดความกว้างไม่ให้ใหญ่เกินไป */
            width: 100%;
            flex-wrap: wrap; /* ถ้าเปิดในจอเล็ก ให้ฝั่งขวาตกลงมาอยู่ด้านล่างอัตโนมัติ */
        }

        .form-section {
            flex: 1;
            min-width: 350px;
        }

        .image-section {
            flex: 1.2; /* ให้ฝั่งรูปภาพตารางกว้างกว่าฝั่งฟอร์มนิดหน่อย จะได้เห็นชัดๆ */
            min-width: 350px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4; 
            border-radius: 8px;
            padding: 20px;
            border: 1px dashed #ccc;
        }

        .image-section img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        input[type="text"] {
            padding: 10px;
            width: 100%; 
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        /* สไตล์สำหรับช่องแสดงผลลัพธ์ (ทำพื้นหลังสีเทา เพื่อสื่อว่าห้ามพิมพ์) */
        input[readonly] {
            background-color: #e9ecef;
            color: #495057;
            cursor: not-allowed;
            border: 1px solid #ced4da;
        }

        /* จุดสำคัญ: ใช้ CSS Grid แบ่งพื้นที่ช่องกรอกและปุ่ม เพื่อล็อกขนาดให้ตรงกันเป๊ะๆ ทุกบรรทัด */
        .income-row {
            display: grid;
            /* แบ่งอัตราส่วน: กล่องพิมพ์ (ยืดได้เต็มที่ 1fr) | ปุ่มบวก (35px) | ปุ่มลบ (35px) */
            grid-template-columns: 1fr 35px 35px; 
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }

        .btn {
            width: 35px;
            height: 35px;
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* สไตล์ตอนปุ่มโดนล็อก (กดไม่ได้) */
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-add { background-color: #4CAF50; }
        .btn-remove { background-color: #f44336; }
        
        /* จุดแสดงข้อความแจ้งเตือน Error */
        #error-message {
            color: #dc3545;
            font-weight: bold;
            margin-top: 15px;
            min-height: 20px;
        }
        .hr-divider {
            border: 0;
            border-top: 1px dashed #ccc;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div class="form-section">
            <h2>โปรแกรมคำนวณภาษีเงินได้บุคคลธรรมดา</h2>
            
            <div class="form-group">
                <label>รายได้ (บาท)</label>
                <div id="income-container">
                    <div class="income-row">
                        <input type="text" class="income-input" oninput="calculateTax()" placeholder="กรอกรายได้...">
                        <button class="btn btn-add" id="add-btn" onclick="addIncomeBox()">+</button>
                        <button class="btn btn-remove" id="remove-btn" onclick="removeIncomeBox()">-</button>
                    </div>
                </div>
            </div>

            <div id="error-message"></div>

            <hr class="hr-divider">

            <div class="form-group">
                <label>รายได้รวม (บาท)</label>
                <input type="text" id="total-income" readonly>
            </div>
            <div class="form-group">
                <label>อัตราภาษีสูงสุดที่ตกเกณฑ์</label>
                <input type="text" id="tax-rate" readonly>
            </div>
            <div class="form-group">
                <label>ภาษีที่ต้องจ่าย (บาท)</label>
                <input type="text" id="tax-amount" readonly>
            </div>
        </div>

        <div class="image-section">
            <img src="tax-table.jpg" alt="ตารางอัตราภาษีเงินได้บุคคลธรรมดาใหม่">
        </div>

    </div>

    <script>
        // สร้างตัวแปรเก็บจำนวนช่องกรอกรายได้ปัจจุบัน (จำกัดให้เพิ่มได้สูงสุด 3 ช่อง)
        let incomeBoxCount = 1;
        const MAX_BOXES = 3;

        // ฟังก์ชันสำหรับเช็คว่าควรล็อก (disabled) ปุ่ม + หรือ - ตอนไหนบ้าง
        function updateButtons() {
            document.getElementById('add-btn').disabled = (incomeBoxCount >= MAX_BOXES); // ถ้าครบ 3 ห้ามบวก
            document.getElementById('remove-btn').disabled = (incomeBoxCount <= 1); // ถ้าเหลือ 1 ห้ามลบ
        }

        // ฟังก์ชันสร้างช่องกรอกรายได้เพิ่ม (ใช้ DOM สร้างแท็กใหม่แทรกเข้าไป)
        function addIncomeBox() {
            if (incomeBoxCount >= MAX_BOXES) return;

            const container = document.getElementById('income-container');
            const newRow = document.createElement('div');
            newRow.className = 'income-row';
            // ผูก Event oninput ไว้ด้วย เพื่อให้ช่องที่สร้างใหม่สามารถคำนวณเรียลไทม์ได้เหมือนช่องแรก
            newRow.innerHTML = `<input type="text" class="income-input" oninput="calculateTax()" placeholder="กรอกรายได้เพิ่มเติม...">`;
            
            container.appendChild(newRow);
            incomeBoxCount++;
            
            updateButtons();
            calculateTax(); // สั่งให้คำนวณใหม่ เผื่อผู้ใช้อยากเห็นการอัปเดตแบบเรียลไทม์
        }

        // ฟังก์ชันสำหรับลบช่องกรอกรายได้อันล่างสุดทิ้ง
        function removeIncomeBox() {
            if (incomeBoxCount <= 1) return;

            const container = document.getElementById('income-container');
            container.removeChild(container.lastChild); // ลบกล่องล่าสุดที่ถูกสร้างขึ้น
            incomeBoxCount--;
            
            updateButtons();
            calculateTax(); // พอช่องหายไป ต้องสั่งให้คำนวณใหม่ด้วย
        }

        // ฟังก์ชันหลักที่ใช้ดัก Error และคำนวณภาษี (ทำงานทันทีที่มีการพิมพ์)
        function calculateTax() {
            const inputs = document.querySelectorAll('.income-input');
            const errorMsgElement = document.getElementById('error-message');
            const totalIncomeElement = document.getElementById('total-income');
            const taxRateElement = document.getElementById('tax-rate');
            const taxAmountElement = document.getElementById('tax-amount');
            
            let totalIncome = 0;
            let hasError = false;
            errorMsgElement.innerText = ''; // ล้างข้อความแจ้งเตือนสีแดงออกก่อนเริ่มเช็ค

            // 1. วนลูปดึงค่าจากทุกช่องมาบวกกัน พร้อมกับเช็คว่าผู้ใช้กรอกข้อมูลถูกต้องไหม
            inputs.forEach(input => {
                const valueStr = input.value.trim();
                if (valueStr === '') return; // ถ้าเป็นช่องว่างเฉยๆ ให้ข้ามไป ไม่นำมาคิด

                const valueNum = Number(valueStr);

                // ดักจับ Error: ถ้าผู้ใช้ใส่ตัวอักษร (ไม่ใช่ตัวเลข)
                if (isNaN(valueNum)) {
                    hasError = true;
                    errorMsgElement.innerText = '⚠️ กรุณากรอกตัวเลขเท่านั้น (ห้ามใส่ตัวอักษร)';
                } 
                // ดักจับ Error: ถ้าผู้ใช้ใส่เลขติดลบ
                else if (valueNum < 0) {
                    hasError = true;
                    errorMsgElement.innerText = '⚠️ มีรายได้บางรายการเป็นค่าติดลบ';
                } 
                // ถ้าถูกต้องทั้งหมด ให้นำค่ามาบวกสะสมไว้ใน totalIncome
                else {
                    totalIncome += valueNum;
                }
            });

            // ถ้าตรวจพบ Error ให้เคลียร์ช่องผลลัพธ์ (Read-only) ทิ้ง แล้วหยุดการทำงานทันที
            if (hasError) {
                totalIncomeElement.value = '';
                taxRateElement.value = '';
                taxAmountElement.value = '';
                return;
            }

            // นำยอดรายได้รวมไปแสดงผล (ใช้ toLocaleString เพื่อใส่ลูกน้ำ ให้อ่านง่าย)
            totalIncomeElement.value = totalIncome.toLocaleString('th-TH', {minimumFractionDigits: 2});

            // 2. นำรายได้รวมมาคำนวณภาษีแบบขั้นบันได (Progressive Tax)
            let totalTax = 0;
            let maxRate = 0; // เก็บอัตรา % สูงสุดของฐานที่คำนวณไปถึง
            let remainingIncome = totalIncome;

            // วิธีคิด: เช็คจากฐานราคาสูงสุดลงมาล่างสุด แล้วหักลบยอดที่โดนหักภาษีไปแล้วออกไปเรื่อยๆ
            if (remainingIncome > 5000000) {
                totalTax += (remainingIncome - 5000000) * 0.35;
                remainingIncome = 5000000;
                if (maxRate === 0) maxRate = 35;
            }
            if (remainingIncome > 2000000) {
                totalTax += (remainingIncome - 2000000) * 0.30;
                remainingIncome = 2000000;
                if (maxRate === 0) maxRate = 30;
            }
            if (remainingIncome > 1000000) {
                totalTax += (remainingIncome - 1000000) * 0.25;
                remainingIncome = 1000000;
                if (maxRate === 0) maxRate = 25;
            }
            if (remainingIncome > 750000) {
                totalTax += (remainingIncome - 750000) * 0.20;
                remainingIncome = 750000;
                if (maxRate === 0) maxRate = 20;
            }
            if (remainingIncome > 500000) {
                totalTax += (remainingIncome - 500000) * 0.15;
                remainingIncome = 500000;
                if (maxRate === 0) maxRate = 15;
            }
            if (remainingIncome > 300000) {
                totalTax += (remainingIncome - 300000) * 0.10;
                remainingIncome = 300000;
                if (maxRate === 0) maxRate = 10;
            }
            if (remainingIncome > 150000) {
                totalTax += (remainingIncome - 150000) * 0.05;
                remainingIncome = 150000;
                if (maxRate === 0) maxRate = 5;
            }

            // 3. นำผลลัพธ์อัตราภาษีและยอดที่ต้องจ่ายไปแสดงบนหน้าเว็บ
            taxRateElement.value = maxRate > 0 ? `${maxRate}%` : 'ได้รับการยกเว้น';
            taxAmountElement.value = totalTax.toLocaleString('th-TH', {minimumFractionDigits: 2});
        }

        // เรียกรันฟังก์ชันล็อกปุ่มไว้ตั้งแต่โหลดหน้าเว็บครั้งแรก
        updateButtons();
    </script>

</body>
</html>
